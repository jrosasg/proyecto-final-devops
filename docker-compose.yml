# ============================================================================
# Docker Compose - Plataforma Local de CI/CD, Observabilidad y Seguridad
# ============================================================================
# Servicios:
#   - app-1, app-2, app-3    : Instancias de la aplicación Flask
#   - nginx                  : Balanceador de carga / reverse proxy
#   - prometheus              : Recolección de métricas
#   - grafana                 : Dashboards de métricas
#   - elasticsearch           : Almacenamiento de logs
#   - kibana                  : Visualización de logs
#   - filebeat                : Recolector de logs
#   - vault                   : Gestión de secretos
# ============================================================================

services:

  # ── Aplicación (3 instancias para load balancing) ──────────────────

  app-1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-1
    environment:
      - HOSTNAME=app-1
      - PORT=5000
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-secret-change-me}
      - DB_PASSWORD=${DB_PASSWORD:-not-set}
    expose:
      - "5000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app-net
    labels:
      - "app.role=backend"
      - "app.instance=1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "app.role,app.instance"

  app-2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-2
    environment:
      - HOSTNAME=app-2
      - PORT=5000
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-secret-change-me}
      - DB_PASSWORD=${DB_PASSWORD:-not-set}
    expose:
      - "5000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app-net
    labels:
      - "app.role=backend"
      - "app.instance=2"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-3:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app-3
    environment:
      - HOSTNAME=app-3
      - PORT=5000
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-secret-change-me}
      - DB_PASSWORD=${DB_PASSWORD:-not-set}
    expose:
      - "5000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    networks:
      - app-net
    labels:
      - "app.role=backend"
      - "app.instance=3"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Load Balancer ────────────────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-1
      - app-2
      - app-3
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=loadbalancer"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx Prometheus Exporter ──────────────────────────────────────

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1
    container_name: nginx-exporter
    command:
      - "--nginx.scrape-uri=http://nginx:80/nginx_status"
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=monitoring"

  # ── Prometheus ─────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=monitoring"

  # ── Grafana ────────────────────────────────────────────────────────

  grafana:
    image: grafana/grafana:11.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=monitoring"

  # ── Elasticsearch ──────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=devops-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=logging"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Elasticsearch Prometheus Exporter ──────────────────────────────

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.7.0
    container_name: elasticsearch-exporter
    command:
      - "--es.uri=http://elasticsearch:9200"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=monitoring"

  # ── Kibana ─────────────────────────────────────────────────────────

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=logging"

  # ── Filebeat ───────────────────────────────────────────────────────

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.0
    container_name: filebeat
    user: root
    volumes:
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat-data:/usr/share/filebeat/data
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=logging"

  # ── HashiCorp Vault ────────────────────────────────────────────────

  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    restart: unless-stopped
    networks:
      - app-net
    labels:
      - "app.role=security"

# ── Volúmenes persistentes ──────────────────────────────────────────

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:
  filebeat-data:

# ── Red ──────────────────────────────────────────────────────────────

networks:
  app-net:
    driver: bridge
