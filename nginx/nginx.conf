worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Upstream: pool de instancias de la aplicación ────────────────
    upstream flask_app {
        least_conn;          # Enviar al servidor con menos conexiones activas
        server app-1:5000;
        server app-2:5000;
        server app-3:5000;
    }

    # ── Logging ──────────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_addr":"$upstream_addr",'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_user_agent":"$http_user_agent",'
            '"service":"nginx-lb"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Hardening headers ────────────────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 80;
        server_name _;

        # ── Proxy a la aplicación ────────────────────────────────────
        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Health check del balanceador ─────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx-lb"}';
            add_header Content-Type application/json;
        }

        # ── Stub status para métricas Prometheus ─────────────────────
        location /nginx_status {
            stub_status on;
            access_log off;
            # En producción: restringir por IP
            # allow 172.16.0.0/12;
            # deny all;
        }
    }
}
