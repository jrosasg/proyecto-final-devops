# ============================================================================
# Pipeline CI/CD - GitHub Actions
# Stages: Build → Test → Scan (DevSecOps) → Deploy
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: flask-devops-app
  REGISTRY: ghcr.io

jobs:

  # ══════════════════════════════════════════════════════════════════════
  # Stage 1: Build
  # ══════════════════════════════════════════════════════════════════════
  build:
    name: "🔨 Build"
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('app/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Instalar dependencias
        run: |
          cd app
          pip install -r requirements.txt

      - name: Docker meta (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          load: true

      - name: Verificar imagen construida
        run: docker images | grep ${{ env.IMAGE_NAME }}

  # ══════════════════════════════════════════════════════════════════════
  # Stage 2: Test
  # ══════════════════════════════════════════════════════════════════════
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          cd app
          pip install -r requirements.txt

      - name: Ejecutar tests unitarios
        run: |
          cd app
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Publicar resultados de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: app/test-results.xml

  # ══════════════════════════════════════════════════════════════════════
  # Stage 3: Security Scan (DevSecOps)
  # ══════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build imagen para escaneo
        run: docker build -t ${{ env.IMAGE_NAME }}:scan ./app

      # ── Escaneo de imagen Docker con Trivy ─────────────────────────
      - name: Trivy - Escaneo de imagen Docker
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          output: "trivy-image-report.txt"

      # ── Escaneo de dependencias ────────────────────────────────────
      - name: Trivy - Escaneo de dependencias
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "fs"
          scan-ref: "./app"
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          output: "trivy-deps-report.txt"

      # ── Escaneo de configuración IaC ───────────────────────────────
      - name: Trivy - Escaneo de configuración
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "table"
          exit-code: "0"
          severity: "HIGH,CRITICAL"
          output: "trivy-config-report.txt"

      # ── Escaneo CRÍTICO (bloquea deploy si falla) ──────────────────
      - name: Trivy - Gate de seguridad (bloquea en CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:scan"
          format: "json"
          exit-code: "1"
          severity: "CRITICAL"
          output: "trivy-critical.json"

      # ── Subir reportes de seguridad ────────────────────────────────
      - name: Subir reportes de seguridad
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            trivy-image-report.txt
            trivy-deps-report.txt
            trivy-config-report.txt
            trivy-critical.json

  # ══════════════════════════════════════════════════════════════════════
  # Stage 4: Deploy
  # ══════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy"
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar versión desde tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy con Docker Compose
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "═══════════════════════════════════════════════════"
          echo "  Desplegando versión: ${APP_VERSION}"
          echo "═══════════════════════════════════════════════════"
          
          # En un entorno real con self-hosted runner:
          # docker compose down
          # docker compose build --no-cache
          # docker compose up -d
          
          echo "✓ Build completado"
          echo "✓ Tests pasados"
          echo "✓ Escaneo de seguridad pasado"
          echo "✓ Deploy autorizado para versión ${APP_VERSION}"

      - name: Verificar health de servicios
        run: |
          echo "Verificación de servicios post-deploy:"
          echo "  - App:           http://localhost:80"
          echo "  - Prometheus:    http://localhost:9090"
          echo "  - Grafana:       http://localhost:3000"
          echo "  - Kibana:        http://localhost:5601"
          echo "  - Elasticsearch: http://localhost:9200"
          echo "  - Vault:         http://localhost:8200"

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            trivy-image-report.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
